<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Chatbot</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #343541;
  color: white;
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 250px;
  background: #202123;
  padding: 10px;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  background: #3b3f46;
  border: none;
  color: white;
  cursor: pointer;
}

/* Chat */
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  max-width: 700px;
  margin: 10px auto;
  padding: 12px;
  border-radius: 8px;
}

.user { background: #444654; }
.bot { background: #40414f; }

/* Input */
.chat-input {
  display: flex;
  padding: 10px;
  background: #40414f;
}

.chat-input input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

.chat-input button {
  margin-left: 10px;
  padding: 10px;
  background: #19c37d;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="newChat()">+ New Chat</button>
</div>

<div class="chat-container">

  <div class="chat-box" id="messages"></div>

  <div class="chat-input">
    <input id="input" placeholder="Send a message...">
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
const input = document.getElementById("input");

input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});

function newChat() {
  document.getElementById("messages").innerHTML = "";
}

function send() {
  let msg = input.value;
  if (msg.trim() === "") return;

  let messages = document.getElementById("messages");

  messages.innerHTML += `<div class="message user">👤 ${msg}</div>`;

  let typing = document.createElement("div");
  typing.className = "message bot";
  typing.id = "typing";
  typing.innerText = "🤖 Typing...";
  messages.appendChild(typing);

  fetch("/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({message: msg})
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("typing").remove();

    let botMsg = document.createElement("div");
    botMsg.className = "message bot";

    // typing animation
    let text = data.response;
    let i = 0;

    function type() {
      if (i < text.length) {
        botMsg.innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 15);
      }
    }

    messages.appendChild(botMsg);
    type();

    messages.scrollTop = messages.scrollHeight;
  });

  input.value = "";
}
</script>

</body>
</html>
